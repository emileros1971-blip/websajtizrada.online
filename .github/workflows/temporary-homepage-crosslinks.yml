name: Apply homepage cross-links

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/temporary-homepage-crosslinks.yml

permissions:
  contents: write

jobs:
  patch-homepage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch homepage safely
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          match = re.search(r'<script type="application/ld\+json">(.*?)</script>', text, flags=re.S)
          if not match:
              raise SystemExit('Existing JSON-LD block not found')

          data = json.loads(match.group(1))
          parent = {
              '@type': 'Organization',
              '@id': 'https://silverado.pro/#organization',
              'name': 'Silverado Video Emil Eres PR',
              'url': 'https://silverado.pro/'
          }
          for node in data.get('@graph', []):
              if node.get('@type') in {'Organization', 'ProfessionalService'}:
                  node['parentOrganization'] = parent

          schema = '<script type="application/ld+json" data-cross-brand-schema>' + json.dumps(data, ensure_ascii=False, separators=(',', ':')) + '</script>'
          text = text[:match.start()] + schema + text[match.end():]

          old = '        <p class="hero-meta"><strong>Izrada sajta već od 6.000 RSD.</strong> Pozovite na <a href="#" data-cfg-phone-link data-loc="hero-inline"><strong data-cfg-phone>+381 69 150 8197</strong></a>.</p>'
          new = old + '\n        <p class="hero-meta" data-local-hero-link="true">Tražite lokalnog partnera? <a href="izrada-sajtova-subotica.html"><strong>Izrada sajtova u Subotici</strong></a>.</p>'
          if text.count(old) != 1:
              raise SystemExit('Hero insertion point changed')
          text = text.replace(old, new, 1)

          old = '        <p><strong style="color:#fff">Lokacija:</strong> <span data-cfg-address>Palić / Subotica, Srbija</span></p>'
          new = old + '\n        <p data-cross-brand="true">WebsajtIzrada.online je specijalizovana usluga firme <a href="https://silverado.pro/" target="_blank" rel="noopener">Silverado Video Emil Eres PR</a>.</p>'
          if text.count(old) != 1:
              raise SystemExit('Footer relationship insertion point changed')
          text = text.replace(old, new, 1)

          old = '<ul><li><a href="izrada-sajtova.html">Izrada sajtova</a></li><li><a href="web-shop.html">Web shop</a></li><li><a href="google-ads.html">Google Ads</a></li><li><a href="facebook-instagram-reklame.html">Facebook i Instagram</a></li><li><a href="portfolio.html">Portfolio</a></li><li><a href="cene.html">Cene</a></li></ul>'
          new = '<ul><li><a href="izrada-sajtova.html">Izrada sajtova</a></li><li><a href="izrada-sajtova-subotica.html" data-local-seo-link="true">Izrada sajtova Subotica</a></li><li><a href="web-shop.html">Web shop</a></li><li><a href="google-ads.html">Google Ads</a></li><li><a href="facebook-instagram-reklame.html">Facebook i Instagram</a></li><li><a href="portfolio.html">Portfolio</a></li><li><a href="cene.html">Cene</a></li></ul>'
          if text.count(old) != 1:
              raise SystemExit('Footer services insertion point changed')
          text = text.replace(old, new, 1)

          old = '      <div>Palić / Subotica, Srbija</div>'
          new = '      <div>Silverado Video Emil Eres PR · Palić / Subotica, Srbija</div>'
          if text.count(old) != 1:
              raise SystemExit('Footer legal-name insertion point changed')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate required changes
        run: |
          grep -q 'data-local-hero-link="true"' index.html
          grep -q 'data-cross-brand="true"' index.html
          grep -q 'izrada-sajtova-subotica.html' index.html
          grep -q 'https://silverado.pro/' index.html

      - name: Commit homepage and remove temporary workflow
        run: |
          rm .github/workflows/temporary-homepage-crosslinks.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/temporary-homepage-crosslinks.yml
          git commit -m "Add static Silverado and local SEO links to homepage"
          git push
